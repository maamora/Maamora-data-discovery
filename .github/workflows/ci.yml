name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 --max-line-length=100 --extend-ignore=E501 collect.py contact_info_collect.py enrich.py rank.py run_all.py db.py kerix_collect.py export.py price_signal.py

      - name: Run tests
        shell: bash
        run: |
          set +e
          pytest -q
          code=$?
          # exit 5 = no tests collected; treat as pass until real tests exist
          if [ $code -eq 5 ]; then exit 0; fi
          exit $code

  pipeline:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: suppliers
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d suppliers"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/suppliers
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run pipeline
        run: python run_all.py

      - name: Dump database
        if: always()
        env:
          PGPASSWORD: postgres
        run: pg_dump -h localhost -U postgres suppliers > suppliers.sql

      - name: Upload DB dump
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suppliers-db-dump
          path: suppliers.sql
