name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 --max-line-length=100 --extend-ignore=E501 collect.py enrich.py rank.py run_all.py

      - name: Import check
        run: python -c "import collect, enrich, rank, run_all; print('all modules import OK')"

      - name: Run tests
        run: pytest -q
